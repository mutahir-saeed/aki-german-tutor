<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aki – Dein Deutsch-Tutor</title>
  <meta name="description" content="Practice A1/A2 German with Aki, your AI voice tutor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0a0a12;
      --bg-card:       rgba(255,255,255,0.04);
      --glass-border:  rgba(255,255,255,0.08);
      --text-primary:  #f0f0f5;
      --text-muted:    #8888a4;
      --accent:        #6c5ce7;
      --accent-glow:   rgba(108,92,231,0.35);
      --accent-light:  #a29bfe;
      --danger:        #ff6b6b;
      --danger-glow:   rgba(255,107,107,0.35);
      --success:       #00cec9;
      --success-glow:  rgba(0,206,201,0.25);
      --transition:    0.3s cubic-bezier(0.4,0,0.2,1);
      --font:          'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108,92,231,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,206,201,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      height: 100%;
      padding: 16px 16px 12px;
      gap: 12px;
    }

    /* ── Top Row: Brand + Orb ────────────────────────────────── */
    .top-row {
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
      animation: fadeSlideUp 0.6s ease-out both;
    }
    .brand h1 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent-light), var(--success));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand p {
      font-size: 0.72rem; color: var(--text-muted); margin-top: 2px;
    }

    /* ── Orb ─────────────────────────────────────────────────── */
    .orb-mini {
      position: relative;
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
    }
    .orb-mini .orb {
      width: 36px; height: 36px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--accent-light), var(--accent), #3d2d8f);
      box-shadow: 0 0 30px var(--accent-glow);
      transition: all 0.6s ease;
    }
    .orb-mini.listening .orb {
      animation: listenPulse 1.2s ease-in-out infinite;
      background: radial-gradient(circle at 35% 35%, var(--success), #00a8a3, #007872);
      box-shadow: 0 0 40px var(--success-glow);
    }
    .orb-mini.speaking .orb {
      animation: speakPulse 0.5s ease-in-out infinite alternate;
      box-shadow: 0 0 50px var(--accent-glow);
    }
    .orb-mini.idle .orb { animation: idlePulse 3s ease-in-out infinite; }

    /* ── Subtitle Panel ──────────────────────────────────────── */
    .subtitles {
      flex: 1; width: 100%; max-width: 560px;
      overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 10px; padding: 10px 2px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
      animation: fadeSlideUp 0.6s 0.1s ease-out both;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .subtitles::-webkit-scrollbar { width: 3px; }
    .subtitles::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .sub-bubble {
      max-width: 88%; padding: 10px 14px;
      border-radius: 14px;
      animation: bubbleIn 0.25s ease-out both;
      word-wrap: break-word;
    }
    .sub-bubble.user {
      align-self: flex-end;
      background: rgba(108,92,231,0.15);
      border: 1px solid rgba(108,92,231,0.2);
      border-bottom-right-radius: 4px;
    }
    .sub-bubble.aki {
      align-self: flex-start;
      background: rgba(0,206,201,0.08);
      border: 1px solid rgba(0,206,201,0.12);
      border-bottom-left-radius: 4px;
    }

    .sub-label {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 4px; opacity: 0.5;
    }
    .sub-bubble.user .sub-label { color: var(--accent-light); }
    .sub-bubble.aki  .sub-label { color: var(--success); }

    /* German text (primary) */
    .sub-original {
      font-size: 0.92rem; line-height: 1.5;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* English translation (secondary) */
    .sub-translation {
      font-size: 0.76rem; line-height: 1.4;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .sub-translation.visible {
      opacity: 1;
    }

    .sub-placeholder {
      text-align: center; color: var(--text-muted);
      font-size: 0.8rem; opacity: 0.4;
      padding: 60px 0; font-style: italic;
    }

    /* ── Controls Row ────────────────────────────────────────── */
    .controls {
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      animation: fadeSlideUp 0.6s 0.2s ease-out both;
    }

    .status {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 100px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      transition: all var(--transition);
    }
    .status.connected .status-dot { background: var(--success); box-shadow: 0 0 6px var(--success-glow); }
    .status.error    .status-dot { background: var(--danger);  box-shadow: 0 0 6px var(--danger-glow); }

    .btn-talk {
      padding: 10px 28px;
      font-family: var(--font); font-size: 0.85rem; font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #8b7cf7);
      border: none; border-radius: 100px; cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
      outline: none; white-space: nowrap;
    }
    .btn-talk:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
    .btn-talk:active { transform: translateY(0); }
    .btn-talk.active { background: linear-gradient(135deg, var(--danger), #ff8787); box-shadow: 0 4px 20px var(--danger-glow); }
    .btn-talk:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── Keyframes ────────────────────────────────────────────── */
    @keyframes fadeSlideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes idlePulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
    @keyframes listenPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }
    @keyframes speakPulse { from { transform:scale(1); } to { transform:scale(1.15); } }
    @keyframes bubbleIn { from { opacity:0; transform:translateY(6px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }

    @media (max-width: 400px) {
      .brand h1 { font-size: 1.3rem; }
      .sub-original { font-size: 0.85rem; }
      .sub-translation { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Compact top row -->
    <div class="top-row">
      <div class="orb-mini idle" id="orbContainer">
        <div class="orb"></div>
      </div>
      <div class="brand">
        <h1>Aki</h1>
        <p>Dein A1/A2 Deutsch-Tutor</p>
      </div>
    </div>

    <!-- Subtitle area -->
    <div class="subtitles" id="subtitles">
      <div class="sub-placeholder" id="subPlaceholder">
        Starte ein Gespräch — Untertitel erscheinen hier ✨
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span id="statusText">Bereit</span>
      </div>
      <button class="btn-talk" id="btnTalk">Gespräch starten</button>
    </div>
  </div>

  <script>
    const btnTalk      = document.getElementById('btnTalk');
    const statusEl     = document.getElementById('status');
    const statusText   = document.getElementById('statusText');
    const orbContainer = document.getElementById('orbContainer');
    const subtitlesEl  = document.getElementById('subtitles');
    const subPlaceholder = document.getElementById('subPlaceholder');

    let ws = null, audioCtx = null, mediaStream = null, scriptNode = null;
    let isActive = false, playbackQueue = [], isPlaying = false;

    // Track bubbles for streaming append + translation
    let lastUserBubble = null;
    let lastAkiBubble  = null;
    // Track the bubble that should receive the next translation
    let lastUserBubbleForTranslation = null;
    let lastAkiBubbleForTranslation  = null;

    const INPUT_SR  = 16000;
    const OUTPUT_SR = 24000;
    const BUF_SIZE  = 4096;

    function setStatus(text, type = '') {
      statusText.textContent = text;
      statusEl.className = 'status ' + type;
    }
    function setOrb(state) {
      orbContainer.className = 'orb-mini ' + state;
    }

    // ── Subtitles ────────────────────────────────────────────
    function addSubtitle(speaker, text) {
      if (!text || !text.trim()) return;
      if (subPlaceholder) subPlaceholder.style.display = 'none';

      if (speaker === 'user') {
        if (lastUserBubble) {
          // Append to existing user bubble
          lastUserBubble.querySelector('.sub-original').textContent += text;
          // Clear translation since text changed
          const trEl = lastUserBubble.querySelector('.sub-translation');
          if (trEl) { trEl.textContent = ''; trEl.classList.remove('visible'); }
        } else {
          lastAkiBubble = null;
          lastUserBubble = createBubble('user', 'Du', text);
          lastUserBubbleForTranslation = lastUserBubble;
          subtitlesEl.appendChild(lastUserBubble);
        }
      } else {
        if (lastAkiBubble) {
          lastAkiBubble.querySelector('.sub-original').textContent += text;
          const trEl = lastAkiBubble.querySelector('.sub-translation');
          if (trEl) { trEl.textContent = ''; trEl.classList.remove('visible'); }
        } else {
          lastUserBubble = null;
          lastAkiBubble = createBubble('aki', 'Aki', text);
          lastAkiBubbleForTranslation = lastAkiBubble;
          subtitlesEl.appendChild(lastAkiBubble);
        }
      }
      subtitlesEl.scrollTop = subtitlesEl.scrollHeight;
    }

    function addTranslation(speaker, text) {
      if (!text || !text.trim()) return;
      const bubble = speaker === 'user'
        ? lastUserBubbleForTranslation
        : lastAkiBubbleForTranslation;
      if (!bubble) return;

      const trEl = bubble.querySelector('.sub-translation');
      if (trEl) {
        trEl.textContent = text;
        trEl.classList.add('visible');
      }
      subtitlesEl.scrollTop = subtitlesEl.scrollHeight;
    }

    function createBubble(cls, label, text) {
      const div = document.createElement('div');
      div.className = 'sub-bubble ' + cls;
      div.innerHTML =
        '<div class="sub-label">' + esc(label) + '</div>' +
        '<div class="sub-original">' + esc(text) + '</div>' +
        '<div class="sub-translation"></div>';
      return div;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Audio helpers ────────────────────────────────────────
    function downsampleToInt16(buf, from, to) {
      if (from === to) {
        const out = new Int16Array(buf.length);
        for (let i = 0; i < buf.length; i++) {
          const s = Math.max(-1, Math.min(1, buf[i]));
          out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return out;
      }
      const ratio = from / to, len = Math.round(buf.length / ratio);
      const out = new Int16Array(len);
      for (let i = 0; i < len; i++) {
        const s = Math.max(-1, Math.min(1, buf[Math.round(i * ratio)] || 0));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return out;
    }

    function enqueueAudio(pcm) {
      playbackQueue.push(pcm);
      if (!isPlaying) drainQueue();
    }

    async function drainQueue() {
      if (isPlaying || !playbackQueue.length) return;
      isPlaying = true;
      setOrb('speaking');
      while (playbackQueue.length) {
        await playPCM(playbackQueue.shift());
      }
      isPlaying = false;
      if (isActive) setOrb('listening');
    }

    function playPCM(pcm) {
      return new Promise(resolve => {
        if (!audioCtx) { resolve(); return; }
        const i16 = new Int16Array(pcm.buffer, pcm.byteOffset, pcm.byteLength / 2);
        const ab = audioCtx.createBuffer(1, i16.length, OUTPUT_SR);
        const ch = ab.getChannelData(0);
        for (let i = 0; i < i16.length; i++) ch[i] = i16[i] / 32768.0;
        const src = audioCtx.createBufferSource();
        src.buffer = ab;
        src.connect(audioCtx.destination);
        src.onended = resolve;
        src.start();
      });
    }

    // ── Start / Stop ─────────────────────────────────────────
    async function startConversation() {
      try {
        btnTalk.disabled = true;
        setStatus('Mikrofon…');

        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, sampleRate: INPUT_SR, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SR });
        const capCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = capCtx.createMediaStreamSource(mediaStream);

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          setStatus('Verbunden', 'connected');
          setOrb('listening');
          isActive = true;
          btnTalk.disabled = false;
          btnTalk.textContent = 'Beenden';
          btnTalk.classList.add('active');

          scriptNode = capCtx.createScriptProcessor(BUF_SIZE, 1, 1);
          scriptNode.onaudioprocess = (e) => {
            if (!isActive || ws.readyState !== WebSocket.OPEN) return;
            const pcm = downsampleToInt16(e.inputBuffer.getChannelData(0), capCtx.sampleRate, INPUT_SR);
            ws.send(pcm.buffer);
          };
          source.connect(scriptNode);
          scriptNode.connect(capCtx.destination);
        };

        ws.onmessage = (event) => {
          if (event.data instanceof ArrayBuffer) {
            enqueueAudio(new Uint8Array(event.data));
          } else if (typeof event.data === 'string') {
            try {
              const msg = JSON.parse(event.data);
              if (msg.type === 'transcript') {
                addSubtitle(msg.speaker, msg.text);
              } else if (msg.type === 'translation') {
                addTranslation(msg.speaker, msg.text);
              }
            } catch(e) {}
          }
        };

        ws.onerror = () => { setStatus('Fehler', 'error'); setOrb('idle'); cleanup(); };
        ws.onclose = () => { if (isActive) { setStatus('Getrennt'); setOrb('idle'); cleanup(); } };
      } catch (err) {
        console.error(err);
        setStatus('Fehler: ' + err.message, 'error');
        setOrb('idle');
        cleanup();
      }
    }

    function stopConversation() { cleanup(); setStatus('Beendet'); setOrb('idle'); }

    function cleanup() {
      isActive = false;
      btnTalk.disabled = false;
      btnTalk.textContent = 'Gespräch starten';
      btnTalk.classList.remove('active');
      playbackQueue = []; isPlaying = false;
      lastUserBubble = null; lastAkiBubble = null;
      lastUserBubbleForTranslation = null; lastAkiBubbleForTranslation = null;
      if (scriptNode)  { scriptNode.disconnect(); scriptNode = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (ws && ws.readyState <= WebSocket.OPEN) { ws.close(); ws = null; }
    }

    btnTalk.addEventListener('click', () => {
      if (isActive) stopConversation(); else startConversation();
    });
  </script>
</body>
</html>
